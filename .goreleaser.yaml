version: 2

project_name: unifai

before:
  hooks:
    - go mod tidy

builds:
  - id: unifai
    main: ./cmd/unifai
    binary: unifai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X unifai/internal/version.Version={{ .Version }} -X unifai/internal/version.Commit={{ .Commit }} -X unifai/internal/version.BuildDate={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: unifai-network
    name: unifai-cli

brews:
  - name: unifai
    repository:
      owner: unifai-network
      name: homebrew-unifai-cli
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/unifai-network/unifai-cli"
    description: "CLI for UnifAI services"
    license: "MIT"
    test: |
      system "#{bin}/unifai", "version"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
